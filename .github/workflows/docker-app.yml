name: Docker Images

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - Dockerfile.base
      - .dockerignore
      - bun.lock
      - package.json
      - packages/**
      - scripts/docker-build-only-wrapper.sh
      - scripts/docker-entrypoint.sh
      - .github/workflows/docker-app.yml
  workflow_dispatch:
    inputs:
      runtime_base_image:
        description: Optional runtime base image override
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-app-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # Docker image references must be lowercase. Keep these literal instead of
  # deriving from github.repository_owner, which preserves account casing.
  APP_IMAGE_NAME: youzini-afk/openchamber
  BASE_IMAGE_NAME: youzini-afk/openchamber-runtime-base
  DEFAULT_RUNTIME_BASE_IMAGE: ghcr.io/youzini-afk/openchamber-runtime-base:main

jobs:
  build-runtime-base:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.runtime_base_image == '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract runtime base metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short,prefix=sha-

      - name: Build and push runtime base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=openchamber-runtime-base
          cache-to: type=gha,scope=openchamber-runtime-base,mode=max

  build-app:
    runs-on: ubuntu-latest
    needs: [build-runtime-base]
    if: ${{ always() && (needs.build-runtime-base.result == 'success' || needs.build-runtime-base.result == 'skipped') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract app metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.APP_IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short,prefix=sha-

      - name: Resolve runtime base image
        id: runtime-base
        shell: bash
        env:
          INPUT_RUNTIME_BASE_IMAGE: ${{ inputs.runtime_base_image || '' }}
        run: |
          if [ -n "${INPUT_RUNTIME_BASE_IMAGE}" ]; then
            echo "image=${INPUT_RUNTIME_BASE_IMAGE}" >> "$GITHUB_OUTPUT"
          else
            echo "image=${DEFAULT_RUNTIME_BASE_IMAGE}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            RUNTIME_BASE_IMAGE=${{ steps.runtime-base.outputs.image }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=openchamber-app
          cache-to: type=gha,scope=openchamber-app,mode=max
